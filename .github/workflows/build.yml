name: Spotless, Build and Test

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    branches: [main, development]

jobs:
  format-and-build:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 21

      - name: Cache Gradle data
        uses: actions/cache@v5
        with:
          path: .gradle
          key: ${{ runner.os }}-gradle--${{ hashFiles('**/settings.gradle', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle--

      - name: Cache Gradle shared data
        uses: actions/cache@v5
        with:
          path: ${{ runner.home }}/.gradle/caches
          key: ${{ runner.os }}-gradle-shared--${{ hashFiles('**/settings.gradle', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-shared--

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check formatting with Spotless
        run: ./gradlew spotlessCheck

      - name: Build with Gradle
        run: ./gradlew buildDependents -x spotlessCheck -x test

      - name: Test with Gradle
        run: ./gradlew test -x spotlessCheck --stacktrace --info

      - name: Upload test report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: fabric/build/reports/tests/test/**
