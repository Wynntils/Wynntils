name: Build Gradle Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

permissions:
  contents: read

jobs:
  build:
    name: Build compiled JARs
    runs-on: ubuntu-latest

    steps:
      - name: Check out source code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: ./gradlew buildDependents -x spotlessCheck -x test --stacktrace

      - name: Upload compiled JAR artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wynntils-compiled-jars
          path: |
            fabric/build/libs/*-fabric+MC-*.jar
            neoforge/build/libs/*-neoforge+MC-*.jar
            !**/*-sources.jar
          if-no-files-found: error
          retention-days: 14
